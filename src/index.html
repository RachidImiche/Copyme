<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copyme</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container">
    <div id="mainView" class="main-view">
      <div class="search-bar">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" placeholder="Search clipboard..." autocomplete="off" />
      </div>
      <ul id="clipboardList" class="clipboard-list">
        <!-- Items will be dynamically inserted here -->
      </ul>
    </div>

    <!-- Preview Panel -->
    <div id="previewPanel" class="preview-panel">
      <div class="preview-header">
        <button id="closePreviewBtn" class="action-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Back
        </button>
        <span>Preview</span>
      </div>
      <div class="preview-content">
        <pre id="previewText" hidden></pre>
        <textarea id="previewTextInput" class="preview-text-input" hidden placeholder="Edit your clipboard text..."></textarea>
        <img id="previewImage" alt="Clipboard image preview" hidden />
      </div>
      <div class="preview-footer">
        <button id="previewSaveBtn" class="btn-secondary" hidden>Save</button>
        <button id="previewPasteBtn" class="btn-primary">Paste</button>
      </div>
    </div>

    <div id="unsavedDialogBackdrop" class="dialog-backdrop" hidden>
      <div class="dialog-card" role="dialog" aria-modal="true" aria-labelledby="unsavedDialogTitle">
        <h3 id="unsavedDialogTitle">Unsaved changes</h3>
        <p>You have unsaved edits in this preview.</p>
        <div class="dialog-actions">
          <button id="unsavedCancelBtn" class="btn-secondary">Cancel</button>
          <button id="unsavedOkBtn" class="btn-primary">OK</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>

</html>
